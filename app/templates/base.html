<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}WorkBook{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <script
      src="https://kit.fontawesome.com/3bfd3ce9e5.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <nav>
    {% block navbar %}
      <div class="nav-left">
        <div class="logo">
          <i class="fa-solid fa-book"></i>
          <span>WorkBook</span>
        </div>
      </div>

      <div class="nav-right">
        <a href="{{ url_for('login') }}">Login</a>
        <a href="{{ url_for('register') }}">Register</a>
      </div>
    {% endblock %}
    </nav>

    <!--PAGE CONTENT-->

    <main>
      {% block content %} 

      {% endblock %}
    </main>
  </body>
</html>
